  - id: D4
    title: "Lineup ↔ artists FK inexistente — matching string-normalizado"
    severity: critical
    label: tech-debt
    status: open
    body: |
      ## Descrição
      O matching de artistas no Conflict Engine é string-normalizado (lowercase + trim + diacritics strip). Não há FK `lineup_item → artists.id`. Grafias diferentes (ex: "DJ X" vs "D.J. X") não casam, e o engine não consegue rastrear o artista conflitante até seu perfil.
      
      ## Impacto
      Falsos negativos no cálculo de conflitos quando o mesmo artista é grafado de forma diferente.
      
      ## Origem
      Story 3.3, Section 4.

