# ============================================================
# Memtrace CI Gates — EXAMPLE (NOT applied automatically)
# ============================================================
# This file is generated by the Memtrace x BMAD guided setup.
# It is NOT live CI. To activate, copy the relevant jobs into
# .github/workflows/ci.yml and adapt to your existing pipeline.
#
# Gates implemented:
#   1. Complexity gate — fails if a function with cognitive
#      complexity > threshold is newly introduced.
#   2. Dead-code gate — warns when uncalled symbols increase
#      vs main.
#
# Prerequisites on the runner:
#   - memtrace CLI installed and on PATH
#   - the repo is indexable (memtrace index <root>)
#   - main branch fetched (to compare branch vs main)
# ============================================================

name: memtrace-quality-gates

on:
  pull_request:
    branches: [main]

jobs:
  complexity-gate:
    name: Memtrace — complexity gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Memtrace
        run: |
          # Replace with your real install command for the runner
          # e.g. pipx install memtrace, or download a binary release.
          echo "TODO: install memtrace on runner"

      - name: Index branch
        run: memtrace index .

      - name: Top-N complexity on branch
        id: branch-complexity
        run: |
          memtrace find_most_complex_functions --top-n 15 --output json > complexity-branch.json

      - name: Index main for comparison
        run: |
          git checkout origin/main -- .
          memtrace index . --output-dir .memtrace-main
          git checkout -- .

      - name: Top-N complexity on main
        run: |
          memtrace find_most_complex_functions --top-n 15 --index .memtrace-main --output json > complexity-main.json

      - name: Fail on complexity regression
        run: |
          # Replace with your real comparison logic.
          # Suggested rule: fail if any function appears in branch top-15
          # with complexity > 15 and was NOT present in main top-15.
          node scripts/compare-complexity.js complexity-main.json complexity-branch.json --threshold 15

  dead-code-gate:
    name: Memtrace — dead-code gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Memtrace
        run: echo "TODO: install memtrace on runner"

      - name: Dead code on branch
        run: |
          memtrace index .
          memtrace find_dead_code --limit 100 --output json > dead-branch.json

      - name: Dead code on main
        run: |
          git checkout origin/main -- .
          memtrace index . --output-dir .memtrace-main
          memtrace find_dead_code --limit 100 --index .memtrace-main --output json > dead-main.json
          git checkout -- .

      - name: Warn if dead code increased
        run: |
          # Suggested rule: warn (not fail) if dead-branch.json
          # has more entries than dead-main.json. Fail only on
          # large jumps (e.g. > 20% increase).
          node scripts/compare-dead-code.js dead-main.json dead-branch.json
