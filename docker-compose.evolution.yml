services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: agenda-clubber-evolution
    ports:
      - "8081:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-agenda-clubber-dev-key}
      SERVER_URL: http://localhost:8081
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-db:5432/evolution?schema=public
      LOG_LEVEL: info
    depends_on:
      - evolution-db
    restart: unless-stopped

  evolution-db:
    image: postgres:15-alpine
    container_name: agenda-clubber-evolution-db
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    ports:
      - "5434:5432"
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  evolution_pgdata:
