name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci --prefer-offline
      - run: npm run lint:ci
      - run: npm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Cache .next
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - run: npm ci --prefer-offline
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  db-migrate:
    name: Migrate CI Database
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci --prefer-offline
      - name: Apply Drizzle migrations to CI database
        run: npx drizzle-kit migrate 2>&1 | cat
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Verify public tables
        run: |
          npx tsx -e "
            (async () => {
              const postgres = require('postgres');
              const sql = postgres(process.env.DATABASE_URL, { max: 1, prepare: false, onnotice: (n) => {} });
              const tables = await sql\`
                SELECT table_name FROM information_schema.tables
                WHERE table_schema = 'public' ORDER BY table_name
              \`;
              console.log('Public tables:', tables.length);
              for (const t of tables) console.log(' -', t.table_name);
              if (tables.length === 0) { console.error('ERROR: no public tables created'); process.exit(1); }
              await sql.end();
              console.log('Migration verification: PASS');
            })();
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  unit-tests:
    name: Unit Tests
    needs: [db-migrate]
    if: always() && !cancelled() && (needs.db-migrate.result == 'success' || needs.db-migrate.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci --prefer-offline
      - run: npm run test

      - name: Upload vitest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit
          path: test-results/vitest-junit.xml
          retention-days: 3

  e2e-tests:
    name: E2E Tests
    needs: [db-migrate, build]
    if: always() && !cancelled() && ((needs.db-migrate.result == 'success' || needs.db-migrate.result == 'skipped') && (needs.build.result == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      CI: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Restore .next/cache for E2E build context
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-e2e-${{ github.sha }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/tsconfig.json') }}

      - run: npm ci --prefer-offline

      - name: Build Next.js for E2E
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start Next.js and wait for health check
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: E2E tests (CI)
        run: npm run test:e2e:ci

      - name: Upload Playwright JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: test-results/junit.xml
          retention-days: 3

      - name: Upload E2E report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: PR Test Report Comment
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: daun/playwright-report-summary@v3
        with:
          report-file: playwright-report/results.json

  qa-gate:
    name: QA Gate
    needs: [unit-tests, e2e-tests]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci --prefer-offline

      - name: Download vitest JUnit report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: vitest-junit
          path: test-results

      - name: Download Playwright JUnit report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: playwright-junit
          path: test-results

      - name: Run QA Gate
        id: qa-gate
        run: npm run qa:gate
        continue-on-error: true

      - name: Upload QA Gate Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-gate-report
          path: qa-reports/
          retention-days: 30

      - name: Fail job if QA Gate failed
        if: steps.qa-gate.outcome != 'success'
        run: exit 1
