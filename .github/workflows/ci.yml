name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci --prefer-offline
      - run: npm run lint:ci
      - run: npm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Cache .next
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - run: npm ci --prefer-offline
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  db-migrate:
    name: Migrate CI Database
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci --prefer-offline
      - name: Apply Drizzle migrations to CI database
        run: npx drizzle-kit migrate 2>&1 | cat
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Verify and repair schema
        run: |
          npx tsx -e "
            (async () => {
              const postgres = require('postgres');
              const sql = postgres(process.env.DATABASE_URL, { max: 1, prepare: false, onnotice: (n) => {} });

              // Verify core tables exist
              const tables = await sql\`
                SELECT table_name FROM information_schema.tables
                WHERE table_schema = 'public' ORDER BY table_name
              \`;
              console.log('Public tables:', tables.length);
              for (const t of tables) console.log(' -', t.table_name);
              if (tables.length === 0) { console.error('ERROR: no public tables created'); process.exit(1); }

              // Check known migration artifacts and add any missing (handles journal drift)
              const repairs = [];

              // 012: collectives.whatsapp_phone
              const hasWhatsapp = await sql\`
                SELECT column_name FROM information_schema.columns
                WHERE table_schema = 'public' AND table_name = 'collectives' AND column_name = 'whatsapp_phone'
              \`;
              if (hasWhatsapp.length === 0) {
                repairs.push(\"ALTER TABLE collectives ADD COLUMN IF NOT EXISTS whatsapp_phone TEXT\");
              }

              // 013: event_conflicts table
              const hasConflicts = await sql\`
                SELECT table_name FROM information_schema.tables
                WHERE table_schema = 'public' AND table_name = 'event_conflicts'
              \`;
              if (hasConflicts.length === 0) {
                repairs.push(\`
                  CREATE TABLE IF NOT EXISTS event_conflicts (
                    id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
                    event_a_id uuid NOT NULL REFERENCES events(id) ON DELETE CASCADE,
                    event_b_id uuid NOT NULL REFERENCES events(id) ON DELETE CASCADE,
                    rule text NOT NULL,
                    level text NOT NULL CHECK (level IN ('yellow', 'red')),
                    justification text NOT NULL,
                    status text DEFAULT 'open' NOT NULL CHECK (status IN ('open', 'a_resolved', 'b_resolved', 'consensual_agreement')),
                    resolved_by_a uuid REFERENCES profiles(id),
                    resolved_by_b uuid REFERENCES profiles(id),
                    resolved_at_a timestamptz,
                    resolved_at_b timestamptz,
                    created_at timestamptz DEFAULT now() NOT NULL,
                    updated_at timestamptz DEFAULT now() NOT NULL
                  )
                \`);
              }

              if (repairs.length > 0) {
                console.log('Repairing', repairs.length, 'missing schema artifact(s)...');
                for (const r of repairs) await sql.unsafe(r);

                // Drop stale journal entries so drizzle re-runs their migration files
                await sql.unsafe(\`
                  DELETE FROM __drizzle_migrations
                  WHERE migration_name IN ('012_collectives_whatsapp_phone', '013_event_conflicts')
                \`);

                // Re-run drizzle migrate to create fresh journal entries
                await sql.end();
                require('child_process').execSync('npx drizzle-kit migrate 2>&1 | cat', {
                  stdio: 'inherit',
                  env: { ...process.env, DATABASE_URL: process.env.DATABASE_URL },
                });
              } else {
                console.log('Schema verification: PASS (no repairs needed)');
                await sql.end();
              }
            })();
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  unit-tests:
    name: Unit Tests
    needs: [db-migrate]
    if: always() && !cancelled() && (needs.db-migrate.result == 'success' || needs.db-migrate.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci --prefer-offline
      - run: npm run test

      - name: Upload vitest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit
          path: test-results/vitest-junit.xml
          retention-days: 3

  e2e-tests:
    name: E2E Tests
    needs: [db-migrate, build]
    if: always() && !cancelled() && ((needs.db-migrate.result == 'success' || needs.db-migrate.result == 'skipped') && (needs.build.result == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      CI: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Restore .next/cache for E2E build context
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - run: npm ci --prefer-offline

      - name: Build Next.js for E2E
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start Next.js and wait for health check
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: E2E tests (CI)
        run: npm run test:e2e:ci

      - name: Upload Playwright JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: test-results/junit.xml
          retention-days: 3

      - name: Upload E2E report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: PR Test Report Comment
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: daun/playwright-report-summary@v3
        with:
          report-file: playwright-report/results.json

  qa-gate:
    name: QA Gate
    needs: [unit-tests, e2e-tests]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci --prefer-offline

      - name: Download vitest JUnit report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: vitest-junit
          path: test-results

      - name: Download Playwright JUnit report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: playwright-junit
          path: test-results

      - name: Run QA Gate
        id: qa-gate
        run: npm run qa:gate
        continue-on-error: true

      - name: Upload QA Gate Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-gate-report
          path: qa-reports/
          retention-days: 30

      - name: Fail job if QA Gate failed
        if: steps.qa-gate.outcome != 'success'
        run: exit 1
